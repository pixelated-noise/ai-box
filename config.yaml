alpine-version: "3.23.3"
headless: true

vm:
  cpus: 4
  memory: 4096
  mac: "52:54:00:ab:cd:01"

mounts:
  - host: ~/.claude
    guest: /root/.claude
    readonly: true

provision:
  - apk update
  - apk add curl bash screen
  - apk add libgcc libstdc++ ripgrep
  - curl -fsSL https://claude.ai/install.sh | bash
