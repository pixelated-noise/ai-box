alpine-version: "3.23.3"
headless: false

vm:
  cpus: 4
  memory: 4096
  mac: "52:54:00:ab:cd:01"

mounts:
  - host: ~/.claude
    guest: /root/.claude
    readonly: true

provision:
  - apk update
  - apk add curl bash
  - apk add libgcc libstdc++ ripgrep
  - apk add nodejs npm
  - npm install -g @anthropic-ai/claude-code
